spring.application.name=flowiq-backend-test
spring.docker.compose.enabled=false

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

jwt.secret=flowiq-test-secret-key-change-in-production-min-256-bits-long!!
jwt.access-token-expiration=86400000
jwt.refresh-token-expiration=604800000

flowiq.audit.enabled=false
flowiq.audit.async=false
flowiq.profile.avatar-dir=target/test-avatars
flowiq.demo-seed.enabled=false
