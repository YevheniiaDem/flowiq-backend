# Production profile — activate with SPRING_PROFILES_ACTIVE=prod
# Override all secrets via environment variables (never commit real values).

spring.docker.compose.enabled=false
spring.jpa.show-sql=false
logging.level.org.hibernate.SQL=WARN

# Secrets (required in prod — see ProductionSecretsValidator)
jwt.secret=${JWT_SECRET}
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Disable demo account seeding and public API docs
flowiq.demo-seed.enabled=false
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Shorter access token lifetime (15 minutes); refresh remains 7 days
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:900000}
