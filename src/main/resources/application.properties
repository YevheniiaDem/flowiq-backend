spring.application.name=flowiq-backend

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/flowiq
spring.datasource.username=flowiq
spring.datasource.password=flowiq123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway Migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# Flyway logging
logging.level.org.flywaydb=INFO

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# Docker Compose
spring.docker.compose.enabled=true
spring.docker.compose.file=compose.yaml

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT Configuration
jwt.secret=flowiq-dev-secret-key-change-in-production-min-256-bits-long!!
jwt.access-token-expiration=86400000

# Feature flags
flowiq.features.bank-integrations-enabled=false
jwt.refresh-token-expiration=604800000

# Audit logging
flowiq.audit.enabled=true
flowiq.audit.async=true
flowiq.audit.notification-events-enabled=false
flowiq.audit.retention.financial-years=7
flowiq.audit.retention.security-days=730
flowiq.audit.retention.short-days=90
flowiq.audit.purge-enabled=false
flowiq.profile.avatar-dir=uploads/avatars
