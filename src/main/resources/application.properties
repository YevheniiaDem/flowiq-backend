spring.application.name=flowiq-backend

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/flowiq
spring.datasource.username=flowiq
spring.datasource.password=flowiq123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Docker Compose
spring.docker.compose.enabled=true
spring.docker.compose.file=compose.yaml

# JWT Configuration
jwt.secret=flowiq-dev-secret-key-change-in-production-min-256-bits-long!!
jwt.access-token-expiration=86400000
jwt.refresh-token-expiration=604800000
