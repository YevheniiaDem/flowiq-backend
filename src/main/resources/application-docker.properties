spring.docker.compose.enabled=false

spring.datasource.url=jdbc:postgresql://postgres:5432/flowiq
spring.datasource.username=flowiq
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:flowiq123}

spring.jpa.show-sql=false

logging.level.org.hibernate.SQL=WARN

# Container deployments: override JWT_SECRET; disable demo seed and public API docs
jwt.secret=${JWT_SECRET:flowiq-dev-secret-key-change-in-production-min-256-bits-long!!}
flowiq.demo-seed.enabled=false
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false
