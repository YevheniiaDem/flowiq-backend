services:
  postgres:
    image: 'postgres:15-alpine'
    container_name: flowiq-postgres
    environment:
      - 'POSTGRES_DB=flowiq'
      - 'POSTGRES_USER=flowiq'
      - 'POSTGRES_PASSWORD=flowiq123'
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowiq"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    driver: local
